services:
  app:
    build: ./fire_dept_app
    # No host port mapping: Coolify's proxy handles bridge networking and
    # routes to the container's exposed port (5555) over its internal network.
    environment:
      # app.py reads PORT to choose the uvicorn bind port (default 8000).
      - PORT=5555
    volumes:
      # Named volume persists the SQLite DB and cities.json across redeploys
      # (survives Coolify re-clones). Seeded on first run by entrypoint.sh.
      - articles-data:/app/data
    restart: unless-stopped

volumes:
  articles-data:

services:
  app:
    build: ./fire_dept_app
    # Publish on host port 5555 (matches the container port set via PORT).
    # Point the Cloudflare Tunnel Service URL at http://<host-ip>:5555.
    ports:
      - "5555:5555"
    environment:
      # app.py reads PORT to choose the uvicorn bind port (default 8000).
      - PORT=5555
    volumes:
      # Named volume persists the SQLite DB and cities.json across redeploys
      # (survives Coolify re-clones). Seeded on first run by entrypoint.sh.
      - articles-data:/app/data
    restart: unless-stopped

volumes:
  articles-data:
